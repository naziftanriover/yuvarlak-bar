<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Legend of the West — Kullanıcılar</title>
  <link rel="stylesheet" href="stil.css?v=5" />
  <script>try{document.documentElement.dataset.tema=localStorage.getItem("yb-tema")||"koyu"}catch(e){document.documentElement.dataset.tema="koyu"}</script>
</head>
<body>
  <div class="uygulama">
  <main class="icerik">
  <div class="kapsayici">
    <div id="mesaj" class="mesaj gizli"></div>

    <div class="bolum">
      <h2>Yeni kullanıcı ekle</h2>
      <form id="ekleForm">
        <label>Ad soyad</label><input id="ad" required />
        <label>Kullanıcı adı (boşluksuz)</label><input id="kullaniciAdi" autocomplete="off" required />
        <label>Şifre (en az 6 karakter)</label><input id="sifre" type="text" minlength="6" required />
        <label>Rol</label>
        <select id="rol">
          <option value="GARSON">Garson (sadece sipariş)</option>
          <option value="MUDUR">Müdür (satış, ödeme)</option>
          <option value="PATRON">Patron (her şey)</option>
        </select>
        <button class="dugme-vurgu dugme-blok" type="submit">Kullanıcı ekle</button>
      </form>
    </div>

    <div class="bolum">
      <h2>Kullanıcılar</h2>
      <div id="liste"></div>
    </div>
  </div>
  </main>
  </div>

  <script type="module">
    import { korumaVeProfil, cikisYap, sifreDegistirAkisi, kullanicilariGetir, kullaniciEkle, kullaniciDurum, yetkiVar } from "./uygulama.js";
    import { kabukKur } from "./kabuk.js";

    const profil = await korumaVeProfil();
    kabukKur(profil);

    // Sadece patron yönetebilir.
    if (!yetkiVar(profil.rol, "KULLANICI")) { location.href = "rapor.html"; }

    function mesaj(m, tur) { const k = document.getElementById("mesaj"); k.textContent = m; k.className = "mesaj " + (tur || "hata"); }

    async function yukle() {
      try {
        const kullanicilar = await kullanicilariGetir();
        const kap = document.getElementById("liste"); kap.innerHTML = "";
        for (const k of kullanicilar) {
          const el = document.createElement("div"); el.className = "satir";
          const durum = k.aktif ? "" : " <span class='alt'>(pasif)</span>";
          el.innerHTML = "<span><b>" + k.ad + "</b> <span class='alt'>@" + k.kullaniciAdi + " · " + k.rol + "</span>" + durum + "</span>";
          const b = document.createElement("button");
          b.className = "dugme-kucuk " + (k.aktif ? "dugme-kirmizi" : "");
          b.textContent = k.aktif ? "Pasifleştir" : "Aktifleştir";
          b.disabled = k.uid === profil.uid; // kendini pasifleştirme
          b.onclick = async () => { try { await kullaniciDurum(k.uid, !k.aktif); yukle(); } catch (h) { mesaj(h.message); } };
          const sag = document.createElement("span"); sag.appendChild(b);
          el.appendChild(sag); kap.appendChild(el);
        }
      } catch (h) { mesaj(h.message); }
    }

    document.getElementById("ekleForm").addEventListener("submit", async (olay) => {
      olay.preventDefault();
      try {
        await kullaniciEkle({
          ad: document.getElementById("ad").value.trim(),
          kullaniciAdi: document.getElementById("kullaniciAdi").value.trim(),
          sifre: document.getElementById("sifre").value,
          rol: document.getElementById("rol").value,
        });
        olay.target.reset();
        mesaj("Kullanıcı eklendi.", "bilgi");
        yukle();
      } catch (h) { mesaj("Eklenemedi: " + (h.message || h)); }
    });

    yukle();
  </script>
</body>
</html>
