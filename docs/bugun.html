<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Yuvarlak Bar — Bugün</title>
  <link rel="stylesheet" href="stil.css?v=3" />
</head>
<body>
  <div class="uygulama">
  <main class="icerik">
  <div class="kapsayici genis">
    <div id="mesaj" class="mesaj gizli"></div>

    <div class="bolum">
      <h2>Bugün — anlık durum</h2>
      <div class="istat">
        <div class="kutu"><div class="sayi" id="acikMasa">0</div><div class="etiket">Açık masa</div></div>
        <div class="kutu"><div class="sayi deger-vurgu" id="acikCiro">0,00 ₺</div><div class="etiket">Açık ciro</div></div>
        <div class="kutu"><div class="sayi deger-yesil" id="acikKar">0,00 ₺</div><div class="etiket">Açık kâr</div></div>
      </div>
      <div style="margin-top:12px; display:flex; gap:10px; align-items:center; flex-wrap:wrap;">
        <a href="satis.html" class="dugme-vurgu" style="text-decoration:none; padding:12px 18px; border-radius:10px;">Satışa git →</a>
        <span class="kim" id="guncelleme" style="color:var(--soluk); font-size:13px;"></span>
        <button class="dugme-kucuk" id="btnYenile">Yenile</button>
      </div>
    </div>

    <div class="bolum">
      <h2>Açık masalar</h2>
      <div id="masaList"></div>
    </div>
  </div>
  </main>
  </div>

  <script type="module">
    import { korumaVeProfil, kurusYaz, ROL, masalariGetir, adisyonOzet } from "./uygulama.js";
    import { kabukKur } from "./kabuk.js";

    const profil = await korumaVeProfil();
    // Garson ana sayfayı kullanmaz; sipariş ekranına gitsin.
    if (profil.rol === ROL.GARSON) { location.href = "siparis.html"; }
    kabukKur(profil);

    const el = (id) => document.getElementById(id);
    function mesaj(m) { const k = el("mesaj"); k.textContent = m; k.className = "mesaj hata"; }

    async function anlik() {
      try {
        const masalar = await masalariGetir();
        const dolu = masalar.filter((m) => m.durum === "DOLU" && m.acikAdisyonId);
        let ciro = 0, kar = 0;
        const liste = el("masaList"); liste.innerHTML = dolu.length ? "" : '<div class="bos-not">Şu an açık masa yok.</div>';
        for (const masa of dolu) {
          const ozet = await adisyonOzet(masa.acikAdisyonId);
          ciro += ozet.ciroKurus; kar += ozet.karKurus;
          const a = document.createElement("a");
          a.className = "satir"; a.href = "satis.html"; a.style.textDecoration = "none"; a.style.color = "inherit";
          a.innerHTML = "<span><b>" + masa.ad + "</b></span><span class='alt' style='color:var(--soluk)'>Ciro: <b class='deger-vurgu'>" + kurusYaz(ozet.ciroKurus) + "</b> · Kâr: <b class='deger-yesil'>" + kurusYaz(ozet.karKurus) + "</b></span>";
          liste.appendChild(a);
        }
        el("acikMasa").textContent = dolu.length;
        el("acikCiro").textContent = kurusYaz(ciro);
        el("acikKar").textContent = kurusYaz(kar);
        el("guncelleme").textContent = "Güncelleme: " + new Date().toLocaleTimeString("tr-TR");
      } catch (h) { mesaj(h.message); }
    }

    el("btnYenile").onclick = anlik;
    anlik();
    setInterval(anlik, 15000);
  </script>
</body>
</html>
