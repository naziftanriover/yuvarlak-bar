<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Yuvarlak Bar — Satış</title>
  <link rel="stylesheet" href="stil.css?v=4" />
</head>
<body>
  <div class="uygulama">
  <main class="icerik">
  <div class="kapsayici genis">
    <div id="mesaj" class="mesaj gizli"></div>

    <div class="bugun-cip">Bugün ciro: <b class="deger-vurgu" id="cipCiro">0,00 ₺</b> · kâr: <b class="deger-yesil" id="cipKar">0,00 ₺</b></div>

    <div id="masaGorunum">
      <div class="bolum">
        <h2>Masalar</h2>
        <div id="masaIzgara" class="izgara"></div>
      </div>

      <div class="bolum">
        <button class="dugme-blok" id="btnYonetim">⚙️ Yönetim (ürün / masa ekle) — göster/gizle</button>
      </div>

      <div id="yonetimAlani" class="gizli">
        <div class="bolum">
          <h2>Kategoriler</h2>
          <form id="kategoriForm" style="display:flex; gap:10px; align-items:flex-end;">
            <div style="flex:1;"><label>Yeni kategori adı</label><input id="kAd" placeholder="Örn: Alkollü İçecek" required /></div>
            <button class="dugme" type="submit" style="margin-bottom:10px;">Ekle</button>
          </form>
          <div id="kategoriListe"></div>
          <button class="dugme-kucuk" id="btnKategoriIceAktar" style="margin-top:8px;">Mevcut ürünlerden kategorileri içe aktar</button>
        </div>

        <div class="bolum">
          <h2>Ürün ekle</h2>
          <form id="urunForm">
            <label>Ürün adı</label><input id="uAd" required />
            <label>Kategori</label><select id="uKategori" required></select>
            <label>Satış fiyatı (TL) <span class="alt" style="color:var(--soluk)">— porsiyon eklersen kullanılmaz</span></label>
            <input id="uFiyat" type="number" step="0.01" min="0" value="0" />
            <label>Maliyet (TL)</label><input id="uMaliyet" type="number" step="0.01" min="0" value="0" />
            <label>Başlangıç stok adedi</label><input id="uStok" type="number" min="0" value="0" required />
            <label style="display:flex; align-items:center; gap:8px;">
              <input id="uStokTakip" type="checkbox" checked style="width:auto; margin:0;" />
              Stok takibi yapılsın (içkiler için kapatabilirsin)
            </label>
            <div class="satir" style="border:none; padding:8px 0;">
              <span id="porsiyonOzet" class="alt" style="color:var(--soluk)">Porsiyon yok (tek fiyat)</span>
              <button type="button" class="dugme-kucuk" id="btnPorsiyon">Porsiyon ekle / düzenle</button>
            </div>
            <button class="dugme-vurgu dugme-blok" type="submit">Ürün ekle</button>
          </form>
        </div>

        <div class="bolum">
          <h2>Masa ekle</h2>
          <form id="masaForm" style="display:flex; gap:10px; align-items:flex-end;">
            <div style="flex:1;"><label>Masa adı</label><input id="mAd" placeholder="Örn: Masa 5" required /></div>
            <button class="dugme" type="submit" style="margin-bottom:10px;">Masa ekle</button>
          </form>
        </div>

        <div class="bolum">
          <h2>Masaları düzenle</h2>
          <div id="masaDuzenle"></div>
        </div>

        <div class="bolum">
          <h2>Ürün yönetimi</h2>
          <div id="urunYonet"></div>
        </div>
      </div>
    </div>

    <div id="detayGorunum" class="gizli">
      <div class="pos-ust">
        <button class="geri" id="btnGeri">← Masalar</button>
        <h2 id="detayBaslik">Masa</h2>
      </div>
      <div class="pos-govde">
        <aside class="pos-adisyon">
          <h3>Adisyon</h3>
          <div id="ozetSatirlar" class="adisyon-liste"></div>
          <div class="adisyon-toplam"><span>Toplam</span><span id="ciro" class="deger-vurgu"></span></div>
          <div class="adisyon-ara"><span>Ödenen</span><span id="odenen"></span></div>
          <div class="adisyon-ara" style="padding-left:12px;"><span>• Nakit</span><span id="odNakit"></span></div>
          <div class="adisyon-ara" style="padding-left:12px;"><span>• Kart</span><span id="odKart"></span></div>
          <div class="adisyon-ara"><span>Kalan</span><span id="kalan"></span></div>

          <div style="margin-top:14px; border-top:1px solid var(--kenar); padding-top:12px;">
            <label>Ödeme tutarı (TL)</label>
            <input id="odemeTutar" type="number" step="0.01" min="0" />
            <div style="display:flex; gap:10px;">
              <button class="dugme-yesil" style="flex:1" id="btnNakit">Nakit</button>
              <button class="dugme-yesil" style="flex:1" id="btnKart">Kart</button>
            </div>
            <button class="dugme-vurgu dugme-blok" style="margin-top:10px" id="btnKapat">Hesabı kapat</button>
          </div>

          <div style="margin-top:12px; border-top:1px solid var(--kenar); padding-top:12px;">
            <label>Masayı taşı / birleştir</label>
            <div style="display:flex; gap:10px;">
              <select id="hedefMasa" style="flex:1; margin:0;"></select>
              <button id="btnTasi">Uygula</button>
            </div>
          </div>
        </aside>
        <main class="pos-urun">
          <div id="kategoriBar" class="kategori-bar"></div>
          <div id="urunIzgara" class="urun-izgara"></div>
        </main>
      </div>
    </div>
  </div>
  </main>
  </div>

  <script type="module">
    import {
      korumaVeProfil, cikisYap, sifreDegistirAkisi, kurusYaz,
      urunleriGetir, urunEkle, urunSeceneklerGuncelle, fiyatGuncelle, malGirisi, stokSayimi, urunDurum,
      kategorileriGetir, kategoriEkle, kategoriAdDegistir, kategoriDurum, kategoriSirala, kategorileriIceAktar,
      masalariGetir, masaEkle, masaAdDegistir, masayaAdisyonAc, masaBirlestir, masaBosalt,
      adisyonOzet, siparisIptal, odemeAl, hesapKapat, ODEME_YONTEMI, bugunGetir,
    } from "./uygulama.js";
    import { posUrunPaneli, posAdisyonCiz, seceneklerDuzenlePenceresi } from "./pos.js";
    import { kabukKur } from "./kabuk.js";

    const profil = await korumaVeProfil();
    kabukKur(profil);
    // Sol menüde "Stoklar" ile gelindiyse yönetim bölümü açık başlasın.
    if (location.search.includes("stok")) document.getElementById("yonetimAlani").classList.remove("gizli");

    let urunler = [];
    let tumMasalar = [];
    let kategoriler = [];
    let seciliAdisyonId = null;
    let seciliMasa = null;
    let yeniSecenekler = []; // yeni ürün için porsiyon tanımları

    const el = (id) => document.getElementById(id);
    function mesaj(m) { const k = el("mesaj"); k.textContent = m; k.className = "mesaj hata"; }
    function bilgi(m) { const k = el("mesaj"); k.textContent = m; k.className = "mesaj bilgi"; }
    function mesajGizle() { el("mesaj").className = "mesaj gizli"; }

    // Üstteki canlı "bugün ciro" çipi.
    async function bugunCip() {
      try { const g = await bugunGetir(); el("cipCiro").textContent = kurusYaz(g.ciroKurus || 0); el("cipKar").textContent = kurusYaz(g.karKurus || 0); }
      catch (h) { /* çip hatası satışı engellemesin */ }
    }

    async function yukle() {
      mesajGizle();
      try {
        [tumMasalar, urunler, kategoriler] = await Promise.all([masalariGetir(), urunleriGetir(true), kategorileriGetir(false)]);
        masalariCiz();
        masaDuzenleCiz();
        kategoriYonetCiz();
        kategoriSecimDoldur();
        urunYonetYukle();
        bugunCip();
      } catch (h) { mesaj(h.message); }
    }

    function aktifKategoriAdlari() {
      return kategoriler.filter((k) => k.aktif !== false).map((k) => k.ad);
    }

    // Ürün formundaki kategori açılır listesi (tanımlı aktif kategoriler).
    function kategoriSecimDoldur() {
      const sec = document.getElementById("uKategori");
      const adlar = aktifKategoriAdlari();
      const oncekiDeger = sec.value;
      sec.innerHTML = adlar.length ? "" : "<option value=''>Önce kategori ekleyin</option>";
      for (const ad of adlar) {
        const o = document.createElement("option");
        o.value = ad; o.textContent = ad; sec.appendChild(o);
      }
      if (adlar.includes(oncekiDeger)) sec.value = oncekiDeger;
    }

    function kategoriYonetCiz() {
      const kap = document.getElementById("kategoriListe");
      kap.innerHTML = kategoriler.length ? "" : '<div class="bos-not">Henüz kategori yok. Yukarıdan ekleyin ya da içe aktarın.</div>';
      kategoriler.forEach((kat, i) => {
        const row = document.createElement("div");
        row.className = "satir";
        row.innerHTML = "<span><b>" + kat.ad + "</b>" + (kat.aktif === false ? " <span class='alt' style='color:var(--soluk)'>· pasif</span>" : "") + "</span>";
        const sag = document.createElement("span");
        sag.style.display = "flex"; sag.style.gap = "6px"; sag.style.flexWrap = "wrap";
        const btn = (t, s) => { const b = document.createElement("button"); b.className = "dugme-kucuk " + (s || ""); b.textContent = t; return b; };
        const bYukari = btn("↑"), bAsagi = btn("↓"), bAd = btn("Adı düzelt"), bDurum = btn(kat.aktif === false ? "Aktifleştir" : "Pasifleştir", kat.aktif === false ? "" : "dugme-kirmizi");
        bYukari.disabled = i === 0; bAsagi.disabled = i === kategoriler.length - 1;
        bYukari.onclick = async () => { try { await kategoriSirala(kat, -1); yukle(); } catch (h) { mesaj(h.message); } };
        bAsagi.onclick = async () => { try { await kategoriSirala(kat, 1); yukle(); } catch (h) { mesaj(h.message); } };
        bAd.onclick = async () => { const yeni = window.prompt("Yeni kategori adı:", kat.ad); if (!yeni || !yeni.trim()) return; try { await kategoriAdDegistir(profil, kat, yeni.trim()); yukle(); } catch (h) { mesaj(h.message); } };
        bDurum.onclick = async () => { try { await kategoriDurum(kat, kat.aktif === false); yukle(); } catch (h) { mesaj(h.message); } };
        sag.append(bYukari, bAsagi, bAd, bDurum);
        row.appendChild(sag); kap.appendChild(row);
      });
    }

    function masalariCiz() {
      const iz = el("masaIzgara");
      iz.innerHTML = tumMasalar.length ? "" : '<div class="bos-not">Henüz masa yok. Yönetim bölümünden masa ekleyin.</div>';
      for (const masa of tumMasalar) {
        const dolu = masa.durum === "DOLU";
        const b = document.createElement("button");
        b.className = "masa " + (dolu ? "dolu" : "bos");
        b.innerHTML = "<span>" + masa.ad + "</span><span class='durum'>" + (dolu ? "Dolu" : "Boş") + "</span>";
        b.onclick = () => masaSec(masa);
        iz.appendChild(b);
      }
    }

    async function masaSec(masa) {
      mesajGizle();
      try {
        let adisyonId = masa.acikAdisyonId;
        if (masa.durum !== "DOLU") adisyonId = await masayaAdisyonAc(profil, masa);
        seciliAdisyonId = adisyonId;
        seciliMasa = masa;
        el("detayBaslik").textContent = masa.ad;
        gorunum(true);
        hedefMasaDoldur(masa.id);
        posUrunPaneli({
          profil, adisyonId: seciliAdisyonId, urunler,
          kategoriKok: el("kategoriBar"), izgaraKok: el("urunIzgara"),
          kategoriAdlari: aktifKategoriAdlari(),
          sonrasi: ozetYukle, hata: mesaj,
        });
        await ozetYukle();
      } catch (h) { mesaj(h.message); }
    }

    async function iptalEt(satir) {
      const sebep = window.prompt("İptal sebebi (zorunlu):");
      if (!sebep || !sebep.trim()) return;
      try { await siparisIptal(profil, seciliAdisyonId, satir, satir.netAdet, sebep); await ozetYukle(); }
      catch (h) { mesaj(h.message); }
    }

    async function ozetYukle() {
      const ozet = await adisyonOzet(seciliAdisyonId);
      posAdisyonCiz(el("ozetSatirlar"), ozet.satirlar, { iptalEt });
      el("ciro").textContent = kurusYaz(ozet.ciroKurus);
      el("odenen").textContent = kurusYaz(ozet.odenenKurus);
      el("odNakit").textContent = kurusYaz(ozet.nakitKurus);
      el("odKart").textContent = kurusYaz(ozet.kartKurus);
      el("kalan").textContent = kurusYaz(ozet.kalanKurus);
      // Kalan negatifse (fazla ödenmişse) kutu 0 göstersin, eksiye düşmesin.
      el("odemeTutar").value = (Math.max(0, ozet.kalanKurus) / 100).toFixed(2);
      bugunCip(); // her sipariş/iptal/ödeme sonrası bugün cirosu güncellensin
    }

    async function odeme(yontem) {
      const tl = parseFloat(el("odemeTutar").value);
      if (!(tl > 0)) { mesaj("Ödeme tutarı 0'dan büyük olmalı. (Bu hesapta ödenecek tutar kalmamış olabilir.)"); return; }
      const kurus = Math.round(tl * 100);
      try {
        await odemeAl(profil, seciliAdisyonId, kurus, yontem);
        await ozetYukle();
        bilgi(kurusYaz(kurus) + " " + (yontem === ODEME_YONTEMI.NAKIT ? "NAKİT" : "KART") + " olarak alındı.");
      } catch (h) { mesaj(h.message); }
    }

    async function kapat() {
      if (!window.confirm("Hesap kapatılsın mı?")) return;
      try { await hesapKapat(seciliAdisyonId, seciliMasa.id); temizGorunum(); }
      catch (h) { mesaj(h.message); }
    }

    function hedefMasaDoldur(mevcutId) {
      const sec = el("hedefMasa");
      const digerleri = tumMasalar.filter((m) => m.id !== mevcutId);
      sec.innerHTML = digerleri.length ? "" : "<option value=''>Başka masa yok</option>";
      for (const m of digerleri) {
        const o = document.createElement("option");
        o.value = m.id;
        o.textContent = m.ad + (m.durum === "DOLU" ? " (dolu — birleştir)" : " (boş)");
        sec.appendChild(o);
      }
    }
    async function tasi() {
      const id = el("hedefMasa").value;
      const hedef = tumMasalar.find((m) => m.id === id);
      if (!hedef) { mesaj("Masa seçin."); return; }
      if (hedef.durum === "DOLU" && !window.confirm(hedef.ad + " dolu. İki masanın hesabı birleştirilsin mi?")) return;
      try { await masaBirlestir(seciliAdisyonId, seciliMasa.id, hedef); temizGorunum(); }
      catch (h) { mesaj(h.message); }
    }

    function masaDuzenleCiz() {
      const kap = el("masaDuzenle");
      kap.innerHTML = tumMasalar.length ? "" : '<div class="bos-not">Henüz masa yok.</div>';
      for (const masa of tumMasalar) {
        const row = document.createElement("div");
        row.className = "satir";
        row.innerHTML = "<span><b>" + masa.ad + "</b> <span class='alt' style='color:var(--soluk)'>· " + (masa.durum === "DOLU" ? "dolu" : "boş") + "</span></span>";
        const b = document.createElement("button");
        b.className = "dugme-kucuk"; b.textContent = "Adı değiştir";
        b.onclick = async () => {
          const yeni = window.prompt("Yeni masa adı:", masa.ad);
          if (!yeni || !yeni.trim()) return;
          try { await masaAdDegistir(masa, yeni.trim()); yukle(); } catch (h) { mesaj(h.message); }
        };
        const sag = document.createElement("span"); sag.appendChild(b);
        row.appendChild(sag); kap.appendChild(row);
      }
    }

    async function urunYonetYukle() {
      const hepsi = await urunleriGetir(false);
      const kap = el("urunYonet");
      kap.innerHTML = hepsi.length ? "" : '<div class="bos-not">Henüz ürün yok.</div>';
      for (const u of hepsi) {
        const row = document.createElement("div");
        row.className = "satir";
        const porsiyonSayi = Array.isArray(u.secenekler) ? u.secenekler.length : 0;
        const fiyatMetni = porsiyonSayi ? porsiyonSayi + " porsiyon" : kurusYaz(u.satisFiyatiKurus);
        const stokMetni = u.stokTakip === false ? "stok takipsiz" : "stok: " + u.stokAdedi;
        row.innerHTML = "<span><b>" + u.ad + "</b> <span class='alt' style='color:var(--soluk)'>· " + fiyatMetni + " · " + stokMetni + (u.aktif ? "" : " · pasif") + "</span></span>";
        const sag = document.createElement("span");
        sag.style.display = "flex"; sag.style.gap = "6px"; sag.style.flexWrap = "wrap";
        const btn = (t, s) => { const b = document.createElement("button"); b.className = "dugme-kucuk " + (s || ""); b.textContent = t; return b; };
        const bP = btn("Porsiyon"), bF = btn("Fiyat"), bM = btn("Mal girişi"), bS = btn("Sayım"), bD = btn(u.aktif ? "Pasifleştir" : "Aktifleştir", u.aktif ? "dugme-kirmizi" : "");
        bP.onclick = async () => {
          const yeni = await seceneklerDuzenlePenceresi(u.ad + " — porsiyonlar", u.secenekler || []);
          if (yeni === null) return;
          try { await urunSeceneklerGuncelle(profil, u, yeni); yukle(); } catch (h) { mesaj(h.message); }
        };
        bF.onclick = async () => { const t = window.prompt(u.ad + " yeni tek fiyat (TL):", (u.satisFiyatiKurus / 100).toFixed(2)); if (t === null) return; const s = parseFloat(t); if (!(s >= 0)) return mesaj("Geçerli fiyat girin."); try { await fiyatGuncelle(profil, u, Math.round(s * 100)); yukle(); } catch (h) { mesaj(h.message); } };
        bM.onclick = async () => { const t = window.prompt(u.ad + " mal girişi adedi:", "0"); if (t === null) return; const n = parseInt(t, 10); if (!(n > 0)) return mesaj("Geçerli adet girin."); try { await malGirisi(profil, u, n); yukle(); } catch (h) { mesaj(h.message); } };
        bS.onclick = async () => { const t = window.prompt(u.ad + " sayılan stok (mevcut: " + u.stokAdedi + "):", String(u.stokAdedi)); if (t === null) return; const n = parseInt(t, 10); if (!(n >= 0)) return mesaj("Geçerli sayı girin."); const sebep = window.prompt("Sayım notu (isteğe bağlı):", "") || ""; try { await stokSayimi(profil, u, n, sebep); yukle(); } catch (h) { mesaj(h.message); } };
        bD.onclick = async () => { try { await urunDurum(u, !u.aktif); yukle(); } catch (h) { mesaj(h.message); } };
        sag.append(bP, bF, bM, bS, bD);
        row.appendChild(sag); kap.appendChild(row);
      }
    }

    function porsiyonOzetGuncelle() {
      el("porsiyonOzet").textContent = yeniSecenekler.length
        ? yeniSecenekler.length + " porsiyon: " + yeniSecenekler.map((s) => s.ad).join(", ")
        : "Porsiyon yok (tek fiyat)";
    }

    function gorunum(detay) {
      el("detayGorunum").classList.toggle("gizli", !detay);
      el("masaGorunum").classList.toggle("gizli", detay);
    }
    function temizGorunum() { seciliAdisyonId = null; seciliMasa = null; gorunum(false); yukle(); }
    // ← Masalar: sipariş girilmemiş masayı otomatik boşalt (DOLU-boş kalmasın).
    async function geri() {
      if (seciliAdisyonId && seciliMasa) {
        try {
          const ozet = await adisyonOzet(seciliAdisyonId);
          if (ozet.satirlar.length === 0 && ozet.odenenKurus === 0) await masaBosalt(seciliAdisyonId, seciliMasa.id);
        } catch (h) { /* boşaltma hatası akışı durdurmasın */ }
      }
      temizGorunum();
    }

    el("btnGeri").onclick = geri;
    el("btnTasi").onclick = tasi;
    el("btnNakit").onclick = () => odeme(ODEME_YONTEMI.NAKIT);
    el("btnKart").onclick = () => odeme(ODEME_YONTEMI.KART);
    el("btnKapat").onclick = kapat;
    el("btnYonetim").onclick = () => el("yonetimAlani").classList.toggle("gizli");

    el("btnPorsiyon").onclick = async () => {
      const yeni = await seceneklerDuzenlePenceresi("Yeni ürün — porsiyonlar", yeniSecenekler);
      if (yeni === null) return;
      yeniSecenekler = yeni;
      porsiyonOzetGuncelle();
    };

    el("urunForm").addEventListener("submit", async (olay) => {
      olay.preventDefault();
      const porsiyonlu = yeniSecenekler.length > 0;
      const fiyat = parseFloat(el("uFiyat").value) || 0;
      const maliyet = parseFloat(el("uMaliyet").value) || 0;
      const kategori = el("uKategori").value.trim();
      if (!kategori) { mesaj("Önce 'Kategoriler' bölümünden bir kategori ekleyip seçin."); return; }
      if (!porsiyonlu && !(fiyat > 0)) { mesaj("Tek fiyatlı üründe satış fiyatı girin (ya da porsiyon ekleyin)."); return; }
      try {
        await urunEkle({
          ad: el("uAd").value.trim(), kategori,
          satisFiyatiKurus: Math.round((porsiyonlu ? (yeniSecenekler[0].satisFiyatiKurus / 100) : fiyat) * 100),
          maliyetKurus: Math.round((porsiyonlu ? (yeniSecenekler[0].maliyetKurus / 100) : maliyet) * 100),
          stokAdedi: parseInt(el("uStok").value, 10) || 0,
          stokTakip: el("uStokTakip").checked,
          secenekler: yeniSecenekler,
        });
        olay.target.reset();
        yeniSecenekler = [];
        porsiyonOzetGuncelle();
        yukle();
      } catch (h) { mesaj(h.message); }
    });

    el("masaForm").addEventListener("submit", async (olay) => {
      olay.preventDefault();
      try { await masaEkle(el("mAd").value.trim()); olay.target.reset(); yukle(); }
      catch (h) { mesaj(h.message); }
    });

    el("kategoriForm").addEventListener("submit", async (olay) => {
      olay.preventDefault();
      try { await kategoriEkle(el("kAd").value.trim()); olay.target.reset(); yukle(); }
      catch (h) { mesaj(h.message); }
    });
    el("btnKategoriIceAktar").onclick = async () => {
